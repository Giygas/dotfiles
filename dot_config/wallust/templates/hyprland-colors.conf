# Generated by wallust

# ── Raw palette ─────────────────────────────────────────────────
{% for i in range(16) %}
$color{{ i }} = rgba({{ colors[i] | strip }}ff)
{% endfor %}
$background = rgba({{ background | strip }}ff)
$foreground = rgba({{ foreground | strip }}ff)

# ── Semantic aliases (Material You approximation) ───────────────
# Primary: purple accent
$source_color    = rgba({{ color1 | strip }}ff)
$primary         = rgba({{ color9 | strip }}ff)
$inverse_primary = rgba({{ color5 | strip }}ff)
$primary_container = rgba({{ color4 | strip }}ff)
$on_primary      = rgba({{ foreground | strip }}ff)
$on_primary_fixed = rgba({{ color5 | strip }}ff)
$on_primary_fixed_variant = rgba({{ color4 | strip }}ff)

# Secondary: blue tones
$secondary         = rgba({{ color6 | strip }}ff)
$secondary_container = rgba({{ color13 | strip }}ff)
$on_secondary      = rgba({{ foreground | strip }}ff)
$on_secondary_fixed = rgba({{ color5 | strip }}ff)

# Tertiary: brighter accent
$tertiary          = rgba({{ color10 | strip }}ff)
$tertiary_container = rgba({{ color2 | strip }}ff)

# Error
$error       = rgba({{ color3 | strip }}ff)
$on_error    = rgba({{ foreground | strip }}ff)
$error_container = rgba({{ color11 | strip }}ff)

# Surfaces
$surface     = rgba({{ background | strip }}ff)
$on_surface  = rgba({{ foreground | strip }}ff)
$surface_dim = rgba({{ background | strip }}ff)
$surface_bright = rgba({{ color8 | strip }}ff)
$surface_container = rgba({{ background | lighten(0.05) | strip }}ff)
$surface_container_low = rgba({{ background | lighten(0.03) | strip }}ff)
$surface_container_high = rgba({{ background | lighten(0.08) | strip }}ff)
$surface_container_highest = rgba({{ background | lighten(0.12) | strip }}ff)

# Outlines
$outline = rgba({{ color8 | strip }}ff)
$outline_variant = rgba({{ color8 | darken(0.2) | strip }}ff)

# Inverse
$inverse_surface = rgba({{ color7 | strip }}ff)
$inverse_on_surface = rgba({{ color0 | strip }}ff)

# Base16 approximations
$base00 = rgba({{ background | strip }}ff)
$base01 = rgba({{ color0 | lighten(0.05) | strip }}ff)
$base02 = rgba({{ color0 | lighten(0.1) | strip }}ff)
$base03 = rgba({{ color8 | strip }}ff)
$base04 = rgba({{ color8 | lighten(0.1) | strip }}ff)
$base05 = rgba({{ color8 | lighten(0.2) | strip }}ff)
$base06 = rgba({{ color7 | darken(0.1) | strip }}ff)
$base07 = rgba({{ foreground | strip }}ff)
$base08 = rgba({{ color2 | strip }}ff)
$base09 = rgba({{ color1 | strip }}ff)
$base0a = rgba({{ color6 | strip }}ff)
$base0b = rgba({{ color14 | strip }}ff)
$base0c = rgba({{ color4 | strip }}ff)
$base0d = rgba({{ color6 | strip }}ff)
$base0e = rgba({{ color5 | strip }}ff)
$base0f = rgba({{ color13 | strip }}ff)
