# Yazi Flavor — Generated with wallust
#
# Color mapping (Material You approximation via wallust filters):
#   primary           = color9   (bright purple — accents, borders, icons)
#   secondary         = color14  (steel blue — secondary accents, permissions)
#   tertiary          = color10  (bright blue — tertiary accents, markers)
#   error             = color3   (deep magenta — errors, warnings)
#   surface           = background
#   on_surface        = foreground
#   surface_container = background lightened
#   outline           = color8   (muted, borders)
#   primary_container = color9 lightened
#   secondary_container = color14 lightened

# : Manager

[mgr]
cwd = { fg = "#8658C2" }

# Find
find_keyword = { fg = "#D5C4EA", bold = true, italic = true, underline = true }
find_position = { fg = "#614793", bg = "reset", bold = true, italic = true }

# Marker
marker_copied = { fg = "#865CC5", bg = "#865CC5" }
marker_cut = { fg = "#614793", bg = "#614793" }
marker_marked = { fg = "#8658C2", bg = "#8658C2" }
marker_selected = { fg = "#A9BDEE", bg = "#A9BDEE" }

# Count
count_copied = { fg = "#2F1F44", bg = "#865CC5" }
count_cut = { fg = "#2F1F44", bg = "#865CC5" }
count_selected = { fg = "#2F1F44", bg = "#A9BDEE" }

# Border
border_symbol = "│"
border_style = { fg = "#827297" }


# : Tabs
[tabs]
active = { fg = "#2F1F44", bg = "#8658C2", bold = true }
inactive = { fg = "#8658C2", bg = "#392A4D" }


# : Mode
[mode]
normal_main = { fg = "#2F1F44", bg = "#8658C2", bold = true }
normal_alt = { fg = "#8658C2", bg = "#392A4D" }

# Select mode
select_main = { fg = "#2F1F44", bg = "#84A1E7", bold = true }
select_alt = { fg = "#84A1E7", bg = "#392A4D" }

# Unset mode
unset_main = { fg = "#D5C4EA", bg = "#614793", bold = true }
unset_alt = { fg = "#614793", bg = "#392A4D" }


# : Status bar

[status]
# Permissions
perm_sep = { fg = "#827297" }
perm_type = { fg = "#8658C2" }
perm_read = { fg = "#84A1E7" }
perm_write = { fg = "#AA8AD4" }
perm_exec = { fg = "#865CC5" }

# Progress
progress_label = { fg = "#D5C4EA", bold = true }
progress_normal = { fg = "#865CC5", bg = "#827297" }
progress_error = { fg = "#614793", bg = "#AA8AD4" }


# : Pick

[pick]
border = { fg = "#8658C2" }
active = { fg = "#614793", bold = true }
inactive = {}


# : Input

[input]
border = { fg = "#8658C2" }
title = {}
value = {}
selected = { reversed = true }


# : Completion

[cmp]
border = { fg = "#8658C2" }


# : Tasks

[tasks]
border = { fg = "#8658C2" }
title = {}
hovered = { fg = "#614793", bold = true }


# : Which

[which]
mask = { bg = "#392A4D" }
cand = { fg = "#8658C2" }
rest = { fg = "#392A4D" }
desc = { fg = "#614793" }
separator = "  "
separator_style = { fg = "#827297" }


# : Help

[help]
on = { fg = "#8658C2" }
run = { fg = "#614793" }
hovered = { reversed = true, bold = true }
footer = { fg = "#D5C4EA", bg = "#2F1F44" }


# : Spotter

[spot]
border = { fg = "#8658C2" }
title = { fg = "#8658C2" }
tbl_col = { fg = "#84A1E7" }
tbl_cell = { fg = "#614793", bg = "#392A4D" }


# : Notification

[notify]
title_info = { fg = "#865CC5" }
title_warn = { fg = "#84A1E7" }
title_error = { fg = "#614793" }


[indicator]
padding = { open = "▐", close = "▌" }

# : File-specific styles

[filetype]
rules = [
  # Image
  { mime = "image/*", fg = "#8658C2" },
  # Media
  { mime = "{audio,video}/*", fg = "#84A1E7" },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#AA8AD4" },
  # Document
  { mime = "application/{pdf,doc,rtf}", fg = "#865CC5" },
  # Virtual file system
  { mime = "vfs/{absent,stale}", fg = "#392A4D" },
  # Fallback
  { url = "*", fg = "#D5C4EA" },
  { url = "*/", fg = "#8658C2" },
]


[icon]
dirs = [
  { name = ".config", text = "", fg = "#AA8AD4" },
  { name = ".git", text = "", fg = "#614793" },
  { name = ".github", text = "", fg = "#8658C2" },
  { name = ".npm", text = "", fg = "#8658C2" },
  { name = "Desktop", text = "", fg = "#84A1E7" },
  { name = "Development", text = "", fg = "#84A1E7" },
  { name = "Documents", text = "", fg = "#84A1E7" },
  { name = "Downloads", text = "", fg = "#84A1E7" },
  { name = "Library", text = "", fg = "#84A1E7" },
  { name = "Movies", text = "", fg = "#84A1E7" },
  { name = "Music", text = "", fg = "#84A1E7" },
  { name = "Pictures", text = "", fg = "#84A1E7" },
  { name = "Public", text = "", fg = "#84A1E7" },
  { name = "Videos", text = "", fg = "#84A1E7" },
]
conds = [
  # Special files
  { if = "orphan", text = "", fg = "#D5C4EA" },
  { if = "link", text = "", fg = "#827297" },
  { if = "block", text = "", fg = "#84A1E7" },
  { if = "char", text = "", fg = "#84A1E7" },
  { if = "fifo", text = "", fg = "#84A1E7" },
  { if = "sock", text = "", fg = "#84A1E7" },
  { if = "sticky", text = "", fg = "#84A1E7" },
  { if = "dummy", text = "", fg = "#614793" },
  # Fallback
  { if = "dir & hovered", text = "", fg = "#8658C2" },
  { if = "dir", text = "", fg = "#8658C2" },
  { if = "exec", text = "", fg = "#865CC5" },
  { if = "!dir", text = "", fg = "#D5C4EA" },
