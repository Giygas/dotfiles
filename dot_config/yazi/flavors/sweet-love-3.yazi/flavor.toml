# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "#AF865A" }

# Find
find_keyword  = { fg = "#AC5D2F", bold = true, italic = true, underline = true }
find_position = { fg = "#8F6840", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#7B8748", bg = "#7B8748" }
marker_cut      = { fg = "#AC5D2F", bg = "#AC5D2F" }
marker_marked   = { fg = "#585C49", bg = "#585C49" }
marker_selected = { fg = "#D17B49", bg = "#D17B49" }

# Count
count_copied   = { fg = "#1F1F1F", bg = "#7B8748" }
count_cut      = { fg = "#1F1F1F", bg = "#AC5D2F" }
count_selected = { fg = "#1F1F1F", bg = "#D17B49" }

# Border
border_symbol = "│"
border_style  = { fg = "#585C49" }

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#1F1F1F", bg = "#585C49", bold = true }
inactive = { fg = "#585C49", bg = "#402E2E" }

# : }}}


# : Mode {{{

[mode]

normal_main = { fg = "#1F1F1F", bg = "#585C49", bold = true }
normal_alt  = { fg = "#585C49", bg = "#402E2E" }

# Select mode
select_main = { fg = "#1F1F1F", bg = "#D17B49", bold = true }
select_alt  = { fg = "#D17B49", bg = "#402E2E" }

# Unset mode
unset_main = { fg = "#1F1F1F", bg = "#8F6840", bold = true }
unset_alt  = { fg = "#8F6840", bg = "#402E2E" }

# : }}}


# : Status bar {{{

[status]
# Permissions
perm_sep   = { fg = "#535C5C" }
perm_type  = { fg = "#585C49" }
perm_read  = { fg = "#AF865A" }
perm_write = { fg = "#AC5D2F" }
perm_exec  = { fg = "#7B8748" }

# Progress
progress_label  = { fg = "#C0B18B", bold = true }
progress_normal = { fg = "#7B8748", bg = "#4A3637" }
progress_error  = { fg = "#AF865A", bg = "#AC5D2F" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#585C49" }
active   = { fg = "#8F6840", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#585C49" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border = { fg = "#585C49" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#585C49" }
title   = {}
hovered = { fg = "#8F6840", bold = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#402E2E" }
cand            = { fg = "#AF865A" }
rest            = { fg = "#535C5C" }
desc            = { fg = "#8F6840" }
separator       = "  "
separator_style = { fg = "#444B4B" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#AF865A" }
run     = { fg = "#8F6840" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#402E2E", bg = "#C0B18B" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#585C49" }
title    = { fg = "#585C49" }
tbl_col  = { fg = "#AF865A" }
tbl_cell = { fg = "#8F6840", bg = "#4A3637" }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#7B8748" }
title_warn  = { fg = "#AF865A" }
title_error = { fg = "#AC5D2F" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Image
	{ mime = "image/*", fg = "#AF865A" },
	# Media
	{ mime = "{audio,video}/*", fg = "#8F6840" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#775759" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#7B8748" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#535C5C" },
	# Fallback
	{ url = "*", fg = "#C0B18B" },
	{ url = "*/", fg = "#585C49" },
]

# : }}}

[icon]

dirs = [
	{ name = ".config", text = "", fg = "#775759" },
	{ name = ".git", text = "", fg = "#AF865A" },
	{ name = ".github", text = "", fg = "#585C49" },
	{ name = ".npm", text = "", fg = "#585C49" },
	{ name = "Desktop", text = "", fg = "#AF865A" },
	{ name = "Development", text = "", fg = "#AF865A" },
	{ name = "Documents", text = "", fg = "#AF865A" },
	{ name = "Downloads", text = "", fg = "#AF865A" },
	{ name = "Library", text = "", fg = "#AF865A" },
	{ name = "Movies", text = "", fg = "#AF865A" },
	{ name = "Music", text = "", fg = "#AF865A" },
	{ name = "Pictures", text = "", fg = "#AF865A" },
	{ name = "Public", text = "", fg = "#AF865A" },
	{ name = "Videos", text = "", fg = "#AF865A" },
]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#C0B18B" },
	{ if = "link", text = "", fg = "#535C5C" },
	{ if = "block", text = "", fg = "#8F6840" },
	{ if = "char", text = "", fg = "#8F6840" },
	{ if = "fifo", text = "", fg = "#8F6840" },
	{ if = "sock", text = "", fg = "#8F6840" },
	{ if = "sticky", text = "", fg = "#8F6840" },
	{ if = "dummy", text = "", fg = "#AC5D2F" },

	# Fallback
	{ if = "dir & hovered", text = "", fg = "#585C49" },
	{ if = "dir", text = "", fg = "#585C49" },
	{ if = "exec", text = "", fg = "#7B8748" },
	{ if = "!dir", text = "", fg = "#C0B18B" },
]
