[[on-window-detected]]
    if.app-id = 'com.hnc.Discord'
    run = 'move-node-to-workspace social' 

[[on-window-detected]]
    if.app-id = 'com.apple.mail'
    run = ['move-node-to-workspace mail'] 

[[on-window-detected]]
    if.app-id = 'ch.protonmail.desktop'
    run = ['move-node-to-workspace media'] 


